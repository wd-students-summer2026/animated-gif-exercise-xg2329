<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Animated Gif Assignment | Xinyue Gao</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css" />
</head>

<body class="bg-[#f7f8fc] text-slate-800">
    <div class="mx-auto max-w-5xl px-4 py-6 sm:px-6 lg:px-8">
        <main class="mt-8 space-y-6">
            <!-- Intro text for the assignment -->
            <section class="rounded-[28px] bg-white p-6 shadow-sm md:p-8">
                <h1 class="mt-3 text-3xl font-bold text-slate-900 sm:text-4xl">Animated GIF Assignment</h1>
                <p class="text-sm font-semibold tracking-[0.2em] text-[#466caa]">Xinyue Gao</p>
            </section>

            <!-- Main preview and project note -->
            <section class="gap-6 lg:grid-cols-[1.5fr_1fr]">
                <figure class="w-full max-w-[500px] rounded-[22px] object-cover" />
                    <img src="images/gif_xinyuegao.gif" alt="gif image"
                        class="w-full rounded-[22px] object-cover" />
                    <figcaption class="mt-4 text-sm text-slate-500">
                        GIF preview of animated assignment.
                    </figcaption>
                    <ul class="mt-4 space-y-3 text-slate-600">
                        <a href="images/gif_xinyuegao.gif" target="_blank"
                            class="mt-3 inline-block rounded-full bg-[#466caa] px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#38588b]">Open
                            GIF</a>
                        <a href="images/gif_xinyuegao.psd" download
                            class="mt-3 inline-block rounded-full bg-[#8b4b63] px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#733a50]">Download
                            PSD</a>
                    </ul>
                </figure>
            </section>

            <div class="mt-8 text-center">
                <a href="index.html" class="text-sm text-slate-500 underline underline-offset-4">Back to home</a>
            </div>
        </main>
    </div>
</body>

</html>
